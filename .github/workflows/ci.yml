name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  fast-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run fast checks
        run: make fast-check

  harness-simulator:
    runs-on: ubuntu-latest
    needs: fast-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run harness simulator tests
        run: make test-harness-sim

  integration:
    runs-on: ubuntu-latest
    needs: [fast-checks, harness-simulator]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run integration suite
        run: make test-integration
